
backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "news"
    label: "News"
    folder: "news"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "documents"
    label: "Documents"
    folder: "documents"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "File", name: "file", widget: "file"}
