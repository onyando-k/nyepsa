<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Nyeri Pharmacy Association – KMTC</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/favicon.png">
</head>
<body>
    <!-- Navigation (same as others) -->
    <nav class="navbar">
        <!-- ... same navbar code ... -->
    </nav>

    <!-- Hero -->
    <section class="hero hero-gallery">
        <div class="hero-content">
            <h1 class="hero-title">Our <span class="gradient-text">Gallery</span></h1>
            <p class="hero-subtitle">Memories from events, workshops, and celebrations</p>
        </div>
    </section>

    <!-- Gallery Grid -->
    <section class="gallery-section">
        <div class="container">
            <div class="gallery-filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="events">Events</button>
                <button class="filter-btn" data-filter="workshops">Workshops</button>
                <button class="filter-btn" data-filter="outreach">Outreach</button>
            </div>
            
            <div class="gallery-grid">
                <!-- Gallery items with lightbox -->
                <a href="images/gallery1.jpg" class="gallery-item" data-category="events">
                    <img src="images/gallery1.jpg" alt="White Coat">
                    <div class="gallery-overlay">
                        <h3>White Coat Ceremony</h3>
                    </div>
                </a>
                <!-- Add 15+ more images -->
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/gallery.js"></script>
</body>
</html>
